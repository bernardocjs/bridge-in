[build]
builder = "nixpacks"
buildCommand = "yarn workspace api prisma generate && yarn workspace api build"

[variables]
NIXPACKS_NODE_VERSION = "23"

[deploy]
startCommand = "cd apps/api && npx prisma migrate deploy && node dist/main"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"

[[services]]
name = "api"
