services:
  postgres:
    image: postgres:16-alpine
    container_name: bridge-in-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
      POSTGRES_DB: bridge_in
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
